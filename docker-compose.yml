services:
  # OSRM Engine (v6.0.0 to match your data)
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v6.0.0
    volumes:
      - ./data/osm:/data
    ports:
      - "5000:5000"
    command: osrm-routed --algorithm mld /data/ncr.osrm --max-table-size 1000
    restart: always

  # FastAPI Backend (Uses its own .env)
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      - OSRM_URL=http://osrm:5000
    depends_on:
      - osrm
    restart: always
